name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-orchestrator:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Check formatting
        run: |
          black --check .

      - name: Lint
        run: |
          ruff check src tests

      - name: Run tests
        run: |
          pytest -q

      - name: CLI smoke test
        run: |
          mlops list

  docker-build:
    runs-on: ubuntu-latest
    needs: test-orchestrator

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t magistrala .